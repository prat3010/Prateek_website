<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Bangers&amp;display=swap');
      .logo-text {
        font-family: 'Bangers', 'Impact', 'Arial Black', sans-serif;
        font-size: 38px;
        fill: #FAFAFA;
        stroke: #1A1A2E;
        stroke-width: 4px;
        stroke-linejoin: round;
        paint-order: stroke fill;
      }
    </style>
  </defs>
  
  <!-- Pop-art yellow shadow offset -->
  <polygon
    points="50,0 63,18 82,5 74,27 98,28 80,42 100,55 80,58 90,78 70,68 62,92 50,75 38,92 30,68 10,78 20,58 0,55 20,42 2,28 26,27 18,5 37,18"
    fill="#FFEA00"
    transform="translate(3, 3)"
  />
  
  <!-- Main Red Starburst -->
  <polygon
    points="50,0 63,18 82,5 74,27 98,28 80,42 100,55 80,58 90,78 70,68 62,92 50,75 38,92 30,68 10,78 20,58 0,55 20,42 2,28 26,27 18,5 37,18"
    fill="#FF1744"
    stroke="#1A1A2E"
    stroke-width="4"
    stroke-linejoin="round"
  />
  
  <!-- Centered logo text "PS" -->
  <text x="50" y="55" text-anchor="middle" dominant-baseline="central" class="logo-text">PS</text>
</svg>
