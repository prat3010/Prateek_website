<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <!-- Background circle/splash -->
  <circle cx="50" cy="50" r="38" fill="#5A8EB6" opacity="0.15" />
  
  <!-- Terminal prompt chevron ( > ) and cursor ( _ ) -->
  <path d="M 26,45 L 32,50 L 26,55" fill="none" stroke="#2B2B36" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round" />
  <line x1="35" y1="55" x2="43" y2="55" stroke="#2B2B36" stroke-width="3.5" stroke-linecap="round" />
  
  <!-- Terminal floor line -->
  <line x1="15" y1="72" x2="85" y2="72" stroke="#2B2B36" stroke-width="3.5" stroke-linecap="round" />
  
  <!-- Gremlin Head/Face peeking up -->
  <path d="M 32,72 C 32,46 68,46 68,72" fill="#FAF9F6" stroke="#2B2B36" stroke-width="3.5" stroke-linejoin="round" />
  
  <!-- Gremlin Ears (Terracotta Rose) -->
  <path d="M 32,48 L 12,38 Q 24,53 36,55" fill="#D95D67" stroke="#2B2B36" stroke-width="3" stroke-linejoin="round" />
  <path d="M 68,48 L 88,38 Q 76,53 64,55" fill="#D95D67" stroke="#2B2B36" stroke-width="3" stroke-linejoin="round" />
  
  <!-- Big cute eyes -->
  <circle cx="43" cy="58" r="6.5" fill="#2B2B36" />
  <circle cx="45" cy="55.5" r="2.5" fill="#FAF9F6" />
  <circle cx="57" cy="58" r="6.5" fill="#2B2B36" />
  <circle cx="59" cy="55.5" r="2.5" fill="#FAF9F6" />

  <!-- Blush -->
  <ellipse cx="37" cy="63" rx="3.5" ry="2" fill="#DF8B98" opacity="0.6" />
  <ellipse cx="63" cy="63" rx="3.5" ry="2" fill="#DF8B98" opacity="0.6" />
</svg>
