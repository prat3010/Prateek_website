name: Sync & Verify

on:
  push:
    branches:
      - main
    paths:
      - 'src/data/projects.json'
      - 'src/data/skills.json'
      - 'src/data/certificates.json'
      - 'src/data/resume.json'
      - 'src/**/*.tsx'
      - 'src/**/*.ts'
      - 'public/images/**'

jobs:
  verify:
    name: TypeScript & Build Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ vars.NODE_VERSION || 22 }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Lint check
        run: npm run lint

  sync:
    name: Seed Supabase Database
    runs-on: ubuntu-latest
    needs: verify
    if: |
      contains(join(github.event.commits.*.modified, ' '), 'src/data/projects.json') ||
      contains(join(github.event.commits.*.modified, ' '), 'src/data/skills.json') ||
      contains(join(github.event.commits.*.modified, ' '), 'src/data/certificates.json') ||
      contains(join(github.event.commits.*.modified, ' '), 'src/data/resume.json') ||
      contains(join(github.event.commits.*.added, ' '), 'src/data/projects.json') ||
      contains(join(github.event.commits.*.added, ' '), 'src/data/skills.json') ||
      contains(join(github.event.commits.*.added, ' '), 'src/data/certificates.json') ||
      contains(join(github.event.commits.*.added, ' '), 'src/data/resume.json')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run Database Seeder
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python3 scripts/seed_supabase.py
